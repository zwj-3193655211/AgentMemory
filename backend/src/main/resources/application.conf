# AgentMemory 配置文件

# 数据库配置
database {
    # 数据库类型: sqlite 或 postgresql
    type = "postgresql"
    type = ${?DATABASE_TYPE}
    
    # SQLite 配置 (备用)
    sqlitePath = "~/.agentmemory/data/agentmemory.db"
    sqlitePath = ${?SQLITE_PATH}
    
    # PostgreSQL 配置
    url = "jdbc:postgresql://localhost:5500/agentmemory"
    url = ${?DATABASE_URL}
    user = "agentmemory"
    user = ${?DATABASE_USER}
    # 密码必须通过环境变量 DATABASE_PASSWORD 设置
    # 不要在此文件中硬编码密码！
    password = ""
    password = ${?DATABASE_PASSWORD}
    poolSize = 10
}

# 监控配置
watcher {
    # 文件变更检测间隔（毫秒）
    pollInterval = 1000
    # 批量处理大小
    batchSize = 100
}

# Agent 路径配置（可覆盖自动检测）
agents {
    iflow {
        enabled = true
        logPath = "~/.iflow/projects"
    }
    claude {
        enabled = true
        logPath = "~/.claude"
    }
    openclaw {
        enabled = true
        logPath = "~/.openclaw/agents/main/sessions"
    }
    nanobot {
        enabled = true
        logPath = "~/.nanobot"
    }
    qwen {
        enabled = true
        logPath = "~/.qwen/projects"
    }
}

# LLM 配置（用于语义提取，可选）
llm {
    # 模式: local（本地模型）, api（外部API）, disabled（禁用）
    mode = "disabled"
    mode = ${?LLM_MODE}
    
    # 本地模型配置
    local {
        # 模型名称（支持 transformers 加载的模型）
        model = "Qwen/Qwen2.5-1.5B-Instruct"
        model = ${?LLM_LOCAL_MODEL}
        # 缓存目录
        cacheDir = "~/.agentmemory/models"
        cacheDir = ${?LLM_CACHE_DIR}
    }
    
    # 外部 API 配置
    api {
        # API 提供商: openai, zhipu, deepseek, ollama, custom
        provider = "openai"
        provider = ${?LLM_API_PROVIDER}
        
        # API 基础 URL（不同提供商不同）
        # OpenAI: https://api.openai.com/v1
        # 智谱: https://open.bigmodel.cn/api/paas/v4
        # DeepSeek: https://api.deepseek.com/v1
        # Ollama: http://localhost:11434/v1
        baseUrl = "https://api.openai.com/v1"
        baseUrl = ${?LLM_API_BASE}
        
        # API Key（从环境变量读取更安全）
        apiKey = ""
        apiKey = ${?LLM_API_KEY}
        
        # 模型名称
        model = "gpt-4o-mini"
        model = ${?LLM_API_MODEL}
        
        # 请求超时（秒）
        timeout = 30
        timeout = ${?LLM_API_TIMEOUT}
    }
    
    # 提取提示词模板
    extractionPrompt = """
分析以下对话内容，提取结构化记忆信息。

对话内容：
{content}

请判断属于哪种类型并提取信息：
1. ERROR_CORRECTION（错误纠正）: problem, cause, solution
2. USER_PROFILE（用户偏好）: preference, category  
3. BEST_PRACTICE（最佳实践）: scenario, practice
4. PROJECT_CONTEXT（项目上下文）: project_name, tech_stack[], key_info
5. SKILL（技能沉淀）: skill_name, steps[], prerequisites

无价值信息返回: {"type": "SKIP", "reason": "原因"}

严格按JSON格式返回：
{"type": "类型", "title": "简短标题", "tags": ["标签"], "extracted": {...}}
"""
}

# Embedding 服务配置
embedding {
    # 服务地址
    baseUrl = "http://localhost:8100"
    baseUrl = ${?EMBED_BASE_URL}
    
    # 模型维度
    dimension = 512
}

# 会话处理配置
session {
    # 增量处理阈值（消息数）
    incrementalThreshold = 30
    incrementalThreshold = ${?SESSION_INCREMENTAL_THRESHOLD}
    
    # 最大缓存大小
    maxCacheSize = 100
    maxCacheSize = ${?SESSION_MAX_CACHE_SIZE}
}

# 会话压缩配置
compression {
    # 滑动窗口大小
    windowSize = 50
    windowSize = ${?COMPRESSION_WINDOW_SIZE}
    
    # 触发压缩的阈值（消息数）
    summaryThreshold = 100
    summaryThreshold = ${?COMPRESSION_SUMMARY_THRESHOLD}
    
    # 是否自动压缩
    autoCompress = true
    autoCompress = ${?COMPRESSION_AUTO}
    
    # 检查间隔（小时）
    checkIntervalHours = 2
    checkIntervalHours = ${?COMPRESSION_CHECK_INTERVAL}
}

# 内存配置
memory {
    # 数据保留天数
    retention.days = 14
    retention.days = ${?MEMORY_RETENTION_DAYS}
}
